name: Test

on: ["push", "pull_request"]

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
